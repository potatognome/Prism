# config.yaml - Prism Orchestrator Root Configuration
# All config.d/*.yaml files are deep-merged over this in lexical order.

project:
  name: Prism
  version: "0.1.0"
  description: "Modular, deterministic, colour-aware data-quality orchestrator."

orchestrator:
  dry_run: false
  run_id_prefix: "prism"

modules:
  example:
    enabled: true

  prism_params:
    enabled: true
    params_file: "config/prism_params.yaml"
    required_keys:
      - parameters

  date_fixer:
    enabled: false
    date_fields: []
    input_formats:
      - "%Y-%m-%d"
      - "%d/%m/%Y"
      - "%m/%d/%Y"
      - "%d-%m-%Y"
      - "%Y/%m/%d"
      - "%d.%m.%Y"
      - "%Y.%m.%d"
      - "%d %b %Y"
      - "%d %B %Y"
    output_format: "%Y-%m-%d"
    auto_detect: false

logging:
  level: INFO
  log_files:
    SESSION: ".logs/prism/SESSION.log"
    MASTER:  ".logs/prism/MASTER.log"
    RUNTIME: ".logs/prism/RUNTIME.log"
    ERROR:   ".logs/prism/ERROR.log"

colours:
  enabled: true
  field_types:
    text:    "!text"
    numeric: "!int"
    date:    "!date"
    path:    "!path"
  module_actions:
    detect:  "!proc"
    run:     "!proc"
    done:    "!done"
    error:   "!error"
    warn:    "!warn"
    info:    "!info"
